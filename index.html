<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vendas Diarias">
<meta name="theme-color" content="#ea1d2c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Vendas Diarias</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --red: #ea1d2c;
  --red2: #ff4d5a;
  --red-bg: rgba(234,29,44,0.12);
  --red-glow: rgba(234,29,44,0.3);
  --bg: #0a0a0c;
  --s1: #131316;
  --s2: #1a1a1f;
  --s3: #222228;
  --s4: #2a2a32;
  --border: rgba(255,255,255,0.08);
  --text: #f4f4f8;
  --muted: #7a7a90;
  --dim: #3a3a50;
  --green: #00d084;
  --green-bg: rgba(0,208,132,0.1);
  --amber: #ffb020;
  --amber-bg: rgba(255,176,32,0.1);
  --blue: #4d9fff;
  --blue-bg: rgba(77,159,255,0.1);
  --r: 16px;
  --rs: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --font: 'Outfit', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
}

/* ─── APP SHELL ─── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

/* ─── TOP BAR ─── */
.topbar {
  flex-shrink: 0;
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  z-index: 10;
  padding-top: max(16px, env(safe-area-inset-top));
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-pill {
  background: var(--red);
  border-radius: 10px;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900;
  font-size: 14px;
  color: white;
  box-shadow: 0 4px 14px var(--red-glow);
  letter-spacing: -0.5px;
}
.brand-text {
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
}
.brand-text span { color: var(--muted); font-weight: 400; }

.month-selector {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px 6px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  color: var(--text);
  transition: background 0.15s;
}
.month-selector:active { background: var(--s3); }
.month-selector svg { width: 14px; height: 14px; fill: var(--muted); }

/* ─── SCROLL AREA ─── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 16px 16px;
  scroll-behavior: smooth;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ─── SCREENS ─── */
.screen { display: none; }
.screen.active { display: block; }

/* ─── MONTH DRAWER ─── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: var(--s1);
  border-radius: 20px 20px 0 0;
  z-index: 51;
  padding: 0 0 calc(20px + var(--safe-bottom));
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.drawer.open { transform: translateX(-50%) translateY(0); }
.drawer-handle {
  width: 36px; height: 4px;
  background: var(--s4);
  border-radius: 2px;
  margin: 14px auto 20px;
}
.drawer-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 20px 14px;
}
.drawer-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  transition: background 0.1s;
  font-size: 16px;
  font-weight: 500;
}
.drawer-item:active { background: var(--s2); }
.drawer-item.selected { color: var(--red); font-weight: 700; }
.drawer-item .check { color: var(--red); font-size: 18px; }

/* ─── KPI STRIP ─── */
.kpi-strip {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.kpi-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 2px 2px 0 0;
}
.kpi-card.c-red::after { background: var(--red); }
.kpi-card.c-green::after { background: var(--green); }
.kpi-card.c-amber::after { background: var(--amber); }
.kpi-card.c-blue::after { background: var(--blue); }

.kpi-icon {
  font-size: 22px;
  margin-bottom: 10px;
  display: block;
}
.kpi-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 4px;
}
.kpi-val {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1;
}
.kpi-val.small { font-size: 16px; }
.kpi-sub {
  font-size: 11px;
  color: var(--dim);
  margin-top: 5px;
}

/* ─── SECTION HEADER ─── */
.sec-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  margin-top: 20px;
}
.sec-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.2px;
}
.sec-sub { font-size: 12px; color: var(--muted); }

/* ─── CHART CARD ─── */
.chart-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}
.chart-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 2px;
}
.chart-sub {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 14px;
}
.chart-wrap { position: relative; height: 160px; }

/* ─── TABLE ─── */
.table-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 12px;
}
.table-search-wrap {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.table-search {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  outline: none;
}
.table-search:focus { border-color: var(--red); }

.trow {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  cursor: pointer;
  transition: background 0.1s;
}
.trow:last-child { border-bottom: none; }
.trow:active { background: var(--s2); }

.trow-date {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  min-width: 38px;
}
.trow-body { flex: 1; }
.trow-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.trow-detail { font-size: 12px; color: var(--muted); }
.trow-right { text-align: right; }
.trow-val {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  margin-top: 3px;
}
.bg { background: var(--green-bg); color: var(--green); }
.ba { background: var(--amber-bg); color: var(--amber); }
.br { background: var(--red-bg); color: var(--red2); }

.trow-del {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s;
  font-family: var(--font);
}
.trow-del:active { color: var(--red); }

/* ─── LANÇAMENTO SCREEN ─── */
.form-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  margin-bottom: 12px;
}
.form-card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}
.form-card-sub {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 18px;
}
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--muted);
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  padding: 13px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.field input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }
.field input[readonly] {
  background: var(--s3);
  color: var(--muted);
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.auto-calc {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}
.auto-chip {
  flex: 1;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px 14px;
  text-align: center;
}
.auto-chip-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
  margin-bottom: 4px;
}
.auto-chip-val {
  font-size: 16px;
  font-weight: 800;
  color: var(--green);
  letter-spacing: -0.3px;
}

.btn-add {
  width: 100%;
  background: var(--red);
  color: white;
  border: none;
  border-radius: var(--rs);
  padding: 16px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -0.2px;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 4px 20px var(--red-glow);
}
.btn-add:active { opacity: 0.85; transform: scale(0.98); }

.btn-clear {
  width: 100%;
  background: var(--s2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 13px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.15s;
}
.btn-clear:active { background: var(--s3); }

/* ─── RESUMO SCREEN ─── */
.comparison-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}
.comparison-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.comparison-row:last-child { border-bottom: none; }
.comp-month { font-weight: 600; }
.comp-val { font-weight: 700; font-variant-numeric: tabular-nums; }
.comp-delta {
  font-size: 12px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
}
.delta-pos { background: var(--green-bg); color: var(--green); }
.delta-neg { background: var(--red-bg); color: var(--red2); }
.delta-neu { background: var(--s3); color: var(--muted); }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  background: var(--s1);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 0;
  cursor: pointer;
  gap: 4px;
  border: none;
  background: none;
  transition: opacity 0.15s;
}
.nav-item:active { opacity: 0.6; }
.nav-icon {
  font-size: 22px;
  line-height: 1;
}
.nav-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  font-family: var(--font);
  transition: color 0.2s;
}
.nav-item.active .nav-label { color: var(--red); }
.nav-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--red);
  opacity: 0;
  transition: opacity 0.2s;
}
.nav-item.active .nav-dot { opacity: 1; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--s3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index: 99;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── EMPTY ─── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--dim);
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-text { font-size: 14px; }

/* ─── ANIMATIONS ─── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kpi-card { animation: slideUp 0.35s ease both; }
.kpi-card:nth-child(1) { animation-delay: 0.04s; }
.kpi-card:nth-child(2) { animation-delay: 0.08s; }
.kpi-card:nth-child(3) { animation-delay: 0.12s; }
.kpi-card:nth-child(4) { animation-delay: 0.16s; }

/* ─── SKELETON LOADER ─── */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.skel {
  background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
}

/* ─── DETAIL MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 430px;
  background: var(--s1);
  border-radius: 20px 20px 0 0;
  z-index: 61;
  padding: 0 20px calc(20px + var(--safe-bottom));
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.modal.open { transform: translateX(-50%) translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--s4); border-radius: 2px; margin: 14px auto 20px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.3px; }
.modal-date { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.modal-stat { background: var(--s2); border-radius: var(--rs); padding: 14px; }
.modal-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 4px; }
.modal-stat-val { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
.btn-modal-del {
  width: 100%;
  background: var(--red-bg);
  color: var(--red2);
  border: 1px solid rgba(234,29,44,0.2);
  border-radius: var(--rs);
  padding: 14px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-modal-del:active { opacity: 0.8; }
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-pill">$</div>
      <div class="brand-text">Vendas <span>Diárias</span></div>
    </div>
    <button class="month-selector" id="monthBtn" onclick="openDrawer()">
      <span id="monthBtnLabel">fev-2026</span>
      <svg viewBox="0 0 16 16"><path d="M4 6l4 4 4-4"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 6l4 4 4-4"/></svg>
    </button>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scrollArea">

    <!-- ── HOME SCREEN ── -->
    <div class="screen active" id="screen-home">

      <div class="kpi-strip" id="kpiStrip">
        <div class="kpi-card c-red"><span class="kpi-icon">💰</span><div class="kpi-label">Venda iFood</div><div class="kpi-val small" id="k-venda">—</div><div class="kpi-sub" id="k-venda-sub">—</div></div>
        <div class="kpi-card c-green"><span class="kpi-icon">📦</span><div class="kpi-label">Pedidos</div><div class="kpi-val" id="k-pedidos">—</div><div class="kpi-sub" id="k-ped-sub">—</div></div>
        <div class="kpi-card c-amber"><span class="kpi-icon">🎯</span><div class="kpi-label">Ticket Médio</div><div class="kpi-val small" id="k-ticket">—</div><div class="kpi-sub">Por pedido</div></div>
        <div class="kpi-card c-blue"><span class="kpi-icon">📊</span><div class="kpi-label">Participação</div><div class="kpi-val" id="k-part">—</div><div class="kpi-sub">iFood / Loja</div></div>
      </div>

      <div class="sec-header">
        <div class="sec-title">Venda iFood Diária</div>
      </div>
      <div class="chart-card">
        <div class="chart-wrap"><canvas id="chartVendas"></canvas></div>
      </div>

      <div class="sec-header">
        <div class="sec-title">Pedidos & Participação</div>
      </div>
      <div class="chart-card">
        <div class="chart-wrap"><canvas id="chartPedidos"></canvas></div>
      </div>

      <div class="sec-header">
        <div class="sec-title">Ticket Médio</div>
      </div>
      <div class="chart-card">
        <div class="chart-wrap"><canvas id="chartTicket"></canvas></div>
      </div>

    </div>

    <!-- ── LANÇAMENTO SCREEN ── -->
    <div class="screen" id="screen-lancamento">

      <div class="form-card">
        <div class="form-card-title">Novo Lançamento</div>
        <div class="form-card-sub">Período: <span id="formPeriodLabel" style="color:var(--text);font-weight:700">—</span></div>

        <div class="field">
          <label>Data</label>
          <input type="date" id="fData">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Venda Total Loja (R$)</label>
            <input type="number" id="fLoja" placeholder="0,00" inputmode="decimal" min="0" step="0.01">
          </div>
          <div class="field">
            <label>Venda iFood (R$)</label>
            <input type="number" id="fIfood" placeholder="0,00" inputmode="decimal" min="0" step="0.01">
          </div>
        </div>
        <div class="field">
          <label>Nº de Pedidos</label>
          <input type="number" id="fPedidos" placeholder="0" inputmode="numeric" min="0">
        </div>

        <div class="auto-calc">
          <div class="auto-chip">
            <div class="auto-chip-label">Ticket Médio</div>
            <div class="auto-chip-val" id="fAutoTicket">—</div>
          </div>
          <div class="auto-chip">
            <div class="auto-chip-label">Participação</div>
            <div class="auto-chip-val" id="fAutoPart">—</div>
          </div>
        </div>

        <button class="btn-add" onclick="adicionarRegistro()">Adicionar Registro</button>
        <button class="btn-clear" onclick="limparForm()">Limpar campos</button>
      </div>

let currentSheet = Object.keys(dataSheets)[0];
let charts = {};
let modalRow = null;

// ─── UTILS ───
const brl = v => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL', minimumFractionDigits:0, maximumFractionDigits:0 });
const brl2 = v => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL', minimumFractionDigits:2 });
const num = v => v.toLocaleString('pt-BR');

// ─── INIT ───
function init() {
  buildDrawer();
  loadSheet(currentSheet);
}

// ─── DRAWER ───
function buildDrawer() {
  const el = document.getElementById('drawerItems');
  el.innerHTML = Object.keys(dataSheets).map(k => `
    <div class="drawer-item ${k===currentSheet?'selected':''}" onclick="selectSheet('${k}')">
      <span>${k}</span>
      ${k===currentSheet ? '<span class="check">✓</span>' : ''}
    </div>`).join('');
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
function selectSheet(k) {
  currentSheet = k;
  closeDrawer();
  buildDrawer();
  loadSheet(k);
  document.getElementById('monthBtnLabel').textContent = k;
}

// ─── LOAD SHEET ───
function loadSheet(sheet) {
  const raw = dataSheets[sheet];
  const data = raw.filter(r => r.Pedidos > 0);

  const totalV = data.reduce((a,b) => a + b.Venda_iFood, 0);
  const totalP = data.reduce((a,b) => a + b.Pedidos, 0);
  const ticket = totalP > 0 ? totalV / totalP : 0;
  const part   = data.length > 0 ? data.reduce((a,b) => a + b.Participacao, 0) / data.length : 0;

  document.getElementById('k-venda').textContent = brl(totalV);
  document.getElementById('k-pedidos').textContent = num(totalP);
  document.getElementById('k-ticket').textContent = brl2(ticket);
  document.getElementById('k-part').textContent = part.toFixed(1) + '%';
  document.getElementById('k-venda-sub').textContent = data.length + ' dias ativos';
  document.getElementById('k-ped-sub').textContent = 'Média ' + Math.round(totalP/(data.length||1)) + '/dia';
  document.getElementById('formPeriodLabel').textContent = sheet;

  const labels = data.map(d => d.Data.slice(0,5));
  const vendas  = data.map(d => d.Venda_iFood);
  const pedidos = data.map(d => d.Pedidos);
  const parts   = data.map(d => d.Participacao);
  const tickets = data.map(d => d.Ticket_Medio);

  mkChart('chartVendas', 'line', labels, [{
    data: vendas,
    borderColor: '#ea1d2c',
    backgroundColor: ctx => { const g = ctx.chart.ctx.createLinearGradient(0,0,0,160); g.addColorStop(0,'rgba(234,29,44,0.3)'); g.addColorStop(1,'rgba(234,29,44,0)'); return g; },
    fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 4, borderWidth: 2
  }], { y: v => 'R$' + (v/1000).toFixed(0) + 'k' });

  mkChart('chartPedidos', 'bar', labels, [
    { data: pedidos, backgroundColor: 'rgba(0,208,132,0.6)', borderColor: '#00d084', borderWidth: 1, borderRadius: 3, label: 'Pedidos', yAxisID: 'y' },
    { data: parts, borderColor: '#4d9fff', backgroundColor: 'transparent', type: 'line', tension: 0.4, pointRadius: 0, borderWidth: 2, label: '%', yAxisID: 'y2' }
  ], { y: v => v, y2: v => v + '%', multiAxis: true });

  mkChart('chartTicket', 'line', labels, [{
    data: tickets,
    borderColor: '#ffb020',
    backgroundColor: ctx => { const g = ctx.chart.ctx.createLinearGradient(0,0,0,160); g.addColorStop(0,'rgba(255,176,32,0.25)'); g.addColorStop(1,'rgba(255,176,32,0)'); return g; },
    fill: true, tension: 0.4, pointRadius: 0, pointHoverRadius: 4, borderWidth: 2
  }], { y: v => 'R$' + v });

  renderTable(raw, '');
  renderResumo();
}

function mkChart(id, type, labels, datasets, opts) {
  if (charts[id]) charts[id].destroy();
  const scales = {
    x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { maxTicksLimit: 6, font: { size: 10 } } },
    y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { font: { size: 10 }, callback: opts.y || (v=>v) } }
  };
  if (opts.multiAxis) {
    scales.y2 = { position: 'right', grid: { display: false }, ticks: { font: { size: 10 }, callback: opts.y2 || (v=>v) } };
  }
  charts[id] = new Chart(document.getElementById(id), {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: opts.multiAxis || false, position: 'top', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } },
        tooltip: { backgroundColor: '#1a1a1f', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, titleColor: '#f4f4f8', bodyColor: '#7a7a90', padding: 10 }
      },
      scales
    }
  });
}

// ─── TABLE ───
function renderTable(data, filter) {
  const el = document.getElementById('tableRows');
  const rows = data.filter(r => r.Data.includes(filter));
  if (!rows.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Nenhum registro</div></div>`; return; }
  el.innerHTML = rows.map(r => {
    const pc = r.Participacao >= 12 ? 'bg' : r.Participacao >= 8 ? 'ba' : 'br';
    const dayPart = r.Data.slice(0,5);
    return `<div class="trow" onclick="openModal('${r.Data}')">
      <div class="trow-date">${dayPart}</div>
      <div class="trow-body">
        <div class="trow-title">${brl(r.Venda_iFood)}</div>
        <div class="trow-detail">${num(r.Pedidos)} pedidos · ticket ${brl2(r.Ticket_Medio)}</div>
      </div>
      <div class="trow-right">
        <div class="trow-val">${r.Pedidos > 0 ? '' : '—'}</div>
        <div class="badge ${pc}">${r.Participacao.toFixed(1)}%</div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('tableSearch').addEventListener('input', e => {
  renderTable(dataSheets[currentSheet], e.target.value);
});

// ─── MODAL ───
function openModal(date) {
  const r = dataSheets[currentSheet].find(x => x.Data === date);
  if (!r) return;
  modalRow = r;
  document.getElementById('modalTitle').textContent = brl(r.Venda_iFood);
  document.getElementById('modalDate').textContent = r.Data + ' · ' + currentSheet;
  document.getElementById('modalGrid').innerHTML = [
    ['Venda Loja', brl2(r.Venda_Assai)],
    ['Pedidos', num(r.Pedidos)],
    ['Ticket Médio', brl2(r.Ticket_Medio)],
    ['Participação', r.Participacao.toFixed(2) + '%'],
  ].map(([l,v]) => `<div class="modal-stat"><div class="modal-stat-label">${l}</div><div class="modal-stat-val">${v}</div></div>`).join('');
  document.getElementById('modalDelBtn').onclick = () => { deleteRow(date); closeModal(); };
  document.getElementById('modal').classList.add('open');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalOverlay').classList.remove('open');
}
function deleteRow(date) {
  dataSheets[currentSheet] = dataSheets[currentSheet].filter(r => r.Data !== date);
  loadSheet(currentSheet);
  toast('🗑 Registro removido');
}

// ─── ADD RECORD ───
['fLoja','fIfood','fPedidos'].forEach(id => document.getElementById(id).addEventListener('input', autoCalc));
function autoCalc() {
  const loja = parseFloat(document.getElementById('fLoja').value) || 0;
  const ifood = parseFloat(document.getElementById('fIfood').value) || 0;
  const ped = parseInt(document.getElementById('fPedidos').value) || 0;
  document.getElementById('fAutoTicket').textContent = ped > 0 ? brl2(ifood/ped) : '—';
  document.getElementById('fAutoPart').textContent = loja > 0 ? ((ifood/loja)*100).toFixed(1)+'%' : '—';
}

function adicionarRegistro() {
  const dateVal = document.getElementById('fData').value;
  if (!dateVal) { toast('⚠️ Informe a data'); return; }
  const loja   = parseFloat(document.getElementById('fLoja').value) || 0;
  const ifood  = parseFloat(document.getElementById('fIfood').value) || 0;
  const ped    = parseInt(document.getElementById('fPedidos').value) || 0;
  const ticket = ped > 0 ? ifood/ped : 0;
  const part   = loja > 0 ? (ifood/loja)*100 : 0;
  const fmtDate = new Date(dateVal+'T00:00:00').toLocaleDateString('pt-BR');

  const exists = dataSheets[currentSheet].find(r => r.Data === fmtDate);
  if (exists) {
    if (!confirm(`Substituir registro de ${fmtDate}?`)) return;
    dataSheets[currentSheet] = dataSheets[currentSheet].filter(r => r.Data !== fmtDate);
  }
  dataSheets[currentSheet].push({ Data: fmtDate, Venda_Assai: loja, Venda_iFood: ifood, Pedidos: ped, Ticket_Medio: +ticket.toFixed(2), Participacao: +part.toFixed(2) });
  dataSheets[currentSheet].sort((a,b) => {
    const [da,ma,ya]=a.Data.split('/'), [db,mb,yb]=b.Data.split('/');
    return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
  });
  loadSheet(currentSheet);
  limparForm();
  toast('✅ Registro adicionado!');
  switchScreen('home');
}

function limparForm() {
  ['fData','fLoja','fIfood','fPedidos'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fAutoTicket').textContent = '—';
  document.getElementById('fAutoPart').textContent = '—';
}

// ─── RESUMO ───
function renderResumo() {
  const keys = Object.keys(dataSheets);
  const totals = keys.map(k => ({
    k,
    v: dataSheets[k].reduce((a,b) => a + b.Venda_iFood, 0),
    p: dataSheets[k].filter(r=>r.Pedidos>0).reduce((a,b) => a + b.Pedidos, 0)
  }));

  if (charts['chartResumo']) charts['chartResumo'].destroy();
  charts['chartResumo'] = new Chart(document.getElementById('chartResumo'), {
    type: 'bar',
    data: {
      labels: totals.map(t => t.k),
      datasets: [{
        data: totals.map(t => t.v),
        backgroundColor: totals.map(t => t.k === currentSheet ? '#ea1d2c' : 'rgba(234,29,44,0.25)'),
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor:'#1a1a1f', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#f4f4f8', bodyColor:'#7a7a90', padding:10, callbacks: { label: ctx => ' ' + brl(ctx.raw) } } },
      scales: { x: { grid: { display: false }, ticks: { font: { size: 11 } } }, y: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { font: { size: 10 }, callback: v => 'R$'+(v/1000).toFixed(0)+'k' } } }
    }
  });

  const comp = document.getElementById('compCard');
  comp.innerHTML = totals.map((t, i) => {
    let delta = '';
    if (i > 0 && totals[i-1].v > 0) {
      const pct = ((t.v - totals[i-1].v) / totals[i-1].v * 100);
      const cls = pct > 0 ? 'delta-pos' : pct < 0 ? 'delta-neg' : 'delta-neu';
      delta = `<span class="comp-delta ${cls}">${pct > 0 ? '+' : ''}${pct.toFixed(1)}%</span>`;
    }
    return `<div class="comparison-row">
      <span class="comp-month ${t.k===currentSheet?'':''}${t.k===currentSheet?'style="color:var(--red)"':''}">${t.k}</span>
      ${delta}
      <span class="comp-val">${t.v > 0 ? brl(t.v) : '—'}</span>
    </div>`;
  }).join('');
}

// ─── SCREEN SWITCH ───
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.screen === name));
  document.getElementById('scrollArea').scrollTop = 0;
  if (name === 'resumo') renderResumo();
  if (name === 'detalhe') renderTable(dataSheets[currentSheet], document.getElementById('tableSearch').value);
}

// ─── TOAST ───
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:#f4f4f8;font-family:'Outfit',sans-serif">Instalar app</div>
        <div style="font-size:11px;color:#7a7a90;font-family:'Outfit',sans-serif;margin-top:2px">Adicionar à tela inicial</div>
      </div>
      <button onclick="installApp()" style="
        background:#ea1d2c; color:white; border:none;
        border-radius:10px; padding:10px 16px;
        font-size:13px; font-weight:700; cursor:pointer;
        font-family:'Outfit',sans-serif;
      ">Instalar</button>
      <button onclick="document.getElementById('install-banner').remove()" style="
        background:none; border:none; color:#7a7a90;
        font-size:20px; cursor:pointer; padding:0 4px; line-height:1;
      ">✕</button>
    </div>`;
  document.body.appendChild(banner);
}

async function installApp() {
  if (!deferredPrompt) {
    // iOS fallback
    toast('No Safari: toque em Compartilhar → Adicionar à Tela de Início');
    return;
  }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') toast('✅ Instalando...');
  deferredPrompt = null;
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}
</script>
</body>
</html>
